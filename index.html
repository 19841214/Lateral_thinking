<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水平思考謎題 - 高品質朗讀版</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        .card-container { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuRzbw5MzdzHNufEOYxr-WmDqa6mqcyoXh4HKSvfEcotObk4r59rt7GMQEKZXv63k8zytO7__lqFaw/pub?gid=2123710659&single=true&output=csv";
        const AUDIO_TURN_URL = "https://cdn.pixabay.com/download/audio/2025/05/05/audio_ca4220361e.mp3?filename=turn-a-page-336933.mp3";

        // --- Icons ---
        const SpeakerIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        );
        const ShuffleIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l14.2-12.6c.8-1.1 2-1.7 3.3-1.7H22"/><path d="M2 6h1.4c1.3 0 2.5.6 3.3 1.7l14.2 12.6c.8 1.1 2 1.7 3.3 1.7H22"/></svg>
        );
        const ArrowLeftIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        );
        const ArrowRightIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );

        const App = () => {
            const [cards, setCards] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const voicesRef = useRef([]);

            // --- 高品質聲音初始化 ---
            useEffect(() => {
                const loadVoices = () => {
                    voicesRef.current = window.speechSynthesis.getVoices();
                };
                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const findBestVoice = (lang) => {
                const availableVoices = voicesRef.current.filter(v => v.lang.includes(lang));
                // 優先級排序：1. Natural (Edge) 2. Online (Google) 3. Premium 4. 一般
                return availableVoices.find(v => v.name.includes('Natural')) ||
                       availableVoices.find(v => v.name.includes('Google')) ||
                       availableVoices.find(v => v.name.includes('Premium')) ||
                       availableVoices[0];
            };

            const stopSpeech = () => {
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
            };

            const handleSpeak = (e) => {
                e.stopPropagation();
                
                if (isSpeaking) {
                    stopSpeech();
                    return;
                }

                const textToRead = isFlipped ? cards[currentIndex].answer : cards[currentIndex].question;
                const utterance = new SpeechSynthesisUtterance(textToRead);
                
                const isEnglish = /^[A-Za-z0-9\s,.'?!]+$/.test(textToRead);
                const targetLang = isEnglish ? 'en' : 'zh';
                const bestVoice = findBestVoice(targetLang);

                if (bestVoice) {
                    utterance.voice = bestVoice;
                    utterance.lang = bestVoice.lang;
                } else {
                    utterance.lang = isEnglish ? 'en-US' : 'zh-TW';
                }

                utterance.rate = 0.95;
                utterance.pitch = 1.0;

                utterance.onstart = () => setIsSpeaking(true);
                utterance.onend = () => setIsSpeaking(false);
                utterance.onerror = () => setIsSpeaking(false);

                window.speechSynthesis.speak(utterance);
            };

            // 翻牌音效
            const playTurnSound = useCallback(() => {
                const audio = new Audio(AUDIO_TURN_URL);
                audio.volume = 0.3;
                audio.play().catch(() => {});
            }, []);

            // 抓取資料
            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = () => {
                setLoading(true);
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        try {
                            const formattedData = results.data.map((row, index) => {
                                const qKey = Object.keys(row).find(k => k.includes("問題") || k.includes("Question"));
                                const aKey = Object.keys(row).find(k => k.includes("答案") || k.includes("Answer"));
                                return {
                                    id: index,
                                    question: row[qKey] || "讀取問題錯誤",
                                    answer: row[aKey] || "讀取答案錯誤"
                                };
                            }).filter(card => card.question && card.answer);

                            if (formattedData.length === 0) {
                                setError("試算表資料為空");
                            } else {
                                setCards(formattedData);
                                setError(null);
                            }
                        } catch (err) {
                            setError("解析錯誤：" + err.message);
                        }
                        setLoading(false);
                    },
                    error: () => {
                        setError("無法連線至 Google 試算表");
                        setLoading(false);
                    }
                });
            };

            const handleFlip = () => {
                stopSpeech();
                playTurnSound();
                setIsFlipped(!isFlipped);
            };

            const changeCard = (offset) => {
                stopSpeech();
                playTurnSound();
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex(prev => (prev + offset + cards.length) % cards.length);
                }, 200);
            };

            const handleShuffle = () => {
                stopSpeech();
                playTurnSound();
                setIsFlipped(false);
                setTimeout(() => {
                    setCards([...cards].sort(() => Math.random() - 0.5));
                    setCurrentIndex(0);
                }, 300);
            };

            useEffect(() => {
                const onKeyDown = (e) => {
                    if (e.code === 'Space') { e.preventDefault(); handleFlip(); }
                    if (e.code === 'ArrowRight') changeCard(1);
                    if (e.code === 'ArrowLeft') changeCard(-1);
                };
                window.addEventListener('keydown', onKeyDown);
                return () => window.removeEventListener('keydown', onKeyDown);
            }, [cards, isFlipped, currentIndex]);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-gray-100">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                    <p className="text-gray-600">載入高品質題庫中...</p>
                </div>
            );

            if (error) return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm">
                        <div className="text-red-500 text-4xl mb-4">⚠️</div>
                        <h2 className="text-xl font-bold mb-2">出錯了</h2>
                        <p className="text-gray-600 mb-6">{error}</p>
                        <button onClick={fetchData} className="w-full py-2 bg-blue-600 text-white rounded-lg">重試</button>
                    </div>
                </div>
            );

            const currentCard = cards[currentIndex];

            return (
                <div className="min-h-screen bg-gray-100 flex flex-col items-center py-8 px-4">
                    {/* Header */}
                    <header className="w-full max-w-2xl flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-800">
                            水平思考謎題 <span className="text-blue-600 text-lg font-normal ml-2">{cards.length} 題</span>
                        </h1>
                        <div className="flex gap-2">
                            <button 
                                onClick={handleSpeak}
                                className={`flex items-center gap-2 px-3 py-1.5 text-sm font-medium border rounded-lg transition shadow-sm ${isSpeaking ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}
                            >
                                <SpeakerIcon /> {isSpeaking ? '停止' : '高品質朗讀'}
                            </button>
                            <button 
                                onClick={handleShuffle}
                                className="flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition shadow-sm"
                            >
                                <ShuffleIcon /> 洗牌
                            </button>
                        </div>
                    </header>

                    {/* Progress */}
                    <div className="w-full max-w-2xl mb-4 flex justify-between text-sm text-gray-500 font-medium px-1">
                        <span>卡片 {currentIndex + 1} / {cards.length}</span>
                        <span>{isFlipped ? "答案 (Answer)" : "問題 (Question)"}</span>
                    </div>

                    {/* Card */}
                    <div className="relative w-full max-w-2xl h-[400px] perspective-1000 cursor-pointer" onClick={handleFlip}>
                        <div className={`card-container relative w-full h-full transform-style-3d duration-500 ${isFlipped ? 'rotate-y-180' : ''}`}>
                            <div className="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-xl flex flex-col items-center justify-center p-8 border-t-4 border-blue-500">
                                <div className="text-xs font-bold text-blue-500 uppercase tracking-widest mb-4">Question</div>
                                <div className="text-2xl md:text-3xl font-medium text-gray-800 text-center leading-relaxed overflow-y-auto custom-scrollbar w-full max-h-full">
                                    {currentCard.question}
                                </div>
                                <div className="absolute bottom-4 text-gray-400 text-xs animate-pulse">點擊翻牌</div>
                            </div>
                            <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-slate-800 text-white rounded-2xl shadow-xl flex flex-col items-center justify-center p-8 border-t-4 border-green-400">
                                <div className="text-xs font-bold text-green-400 uppercase tracking-widest mb-4">Answer</div>
                                <div className="text-xl md:text-2xl font-light text-center leading-relaxed overflow-y-auto custom-scrollbar w-full max-h-full">
                                    {currentCard.answer}
                                </div>
                                <div className="absolute bottom-4 text-gray-500 text-xs">點擊翻回問題</div>
                            </div>
                        </div>
                    </div>

                    {/* Nav Controls */}
                    <div className="flex items-center gap-8 mt-8">
                        <button 
                            onClick={(e) => { e.stopPropagation(); changeCard(-1); }}
                            className="p-4 rounded-full bg-white text-gray-700 shadow-md hover:bg-blue-50 hover:text-blue-600 hover:scale-110 transition duration-200"
                        >
                            <ArrowLeftIcon />
                        </button>
                        <div className="text-gray-400 text-sm hidden md:block select-none">
                            快捷鍵： <span className="border border-gray-300 rounded px-1.5 mx-1">←</span> <span className="border border-gray-300 rounded px-1.5 mx-1">空白鍵</span> <span className="border border-gray-300 rounded px-1.5 mx-1">→</span>
                        </div>
                        <button 
                            onClick={(e) => { e.stopPropagation(); changeCard(1); }}
                            className="p-4 rounded-full bg-white text-gray-700 shadow-md hover:bg-blue-50 hover:text-blue-600 hover:scale-110 transition duration-200"
                        >
                            <ArrowRightIcon />
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
