<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水平思考謎題：數位課堂投影片</title>
    
    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Poppins:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            overflow: hidden; 
        }
        
        .slide-enter { animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .perspective-container {
            perspective: 2000px;
        }
        .flip-card-inner {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .is-flipped { 
            transform: rotateY(180deg); 
        }
        .backface-hidden { 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
        }
        
        .card-front {
            z-index: 2;
            transform: rotateY(0deg);
        }
        .card-back {
            transform: rotateY(180deg);
        }

        /* 優化捲動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(15, 23, 42, 0.2);
            border-radius: 10px;
        }
        .card-back .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 修正文字被切掉的核心 CSS */
        .content-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        
        /* 讓文字在不溢出時置中，溢出時從頂部開始 */
        .text-wrapper {
            margin: auto 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuRzbw5MzdzHNufEOYxr-WmDqa6mqcyoXh4HKSvfEcotObk4r59rt7GMQEKZXv63k8zytO7__lqFaw/pub?gid=2123710659&single=true&output=csv";

        const SpeakerIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        );

        const App = () => {
            const [puzzles, setPuzzles] = useState([]);
            const [currentStep, setCurrentStep] = useState(0); 
            const [isFlipped, setIsFlipped] = useState(false);
            const [loading, setLoading] = useState(true);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const voicesRef = useRef([]);

            useEffect(() => {
                const loadVoices = () => {
                    voicesRef.current = window.speechSynthesis.getVoices();
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }, []);

            useEffect(() => {
                setLoading(true);
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const data = results.data.map((row, index) => {
                            const qKey = Object.keys(row).find(k => k.includes("問題") || k.includes("Question"));
                            const aKey = Object.keys(row).find(k => k.includes("答案") || k.includes("Answer"));
                            return { id: index, q: row[qKey], a: row[aKey] };
                        }).filter(item => item.q && item.a);
                        setPuzzles(data);
                        setLoading(false);
                    }
                });
            }, []);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                if (isSpeaking) { setIsSpeaking(false); return; }

                const utterance = new SpeechSynthesisUtterance(text);
                const isEnglish = /^[A-Za-z0-9\s,.'?!]+$/.test(text);
                const langCode = isEnglish ? 'en' : 'zh';
                
                const bestVoice = voicesRef.current.find(v => v.lang.includes(langCode) && (v.name.includes('Natural') || v.name.includes('Google'))) || 
                                 voicesRef.current.find(v => v.lang.includes(langCode));
                
                if (bestVoice) utterance.voice = bestVoice;
                utterance.rate = 0.95;
                utterance.onstart = () => setIsSpeaking(true);
                utterance.onend = () => setIsSpeaking(false);
                window.speechSynthesis.speak(utterance);
            };

            const nextSlide = () => {
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
                setIsFlipped(false);
                setCurrentStep(prev => prev + 1);
            };

            const prevSlide = () => {
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
                setIsFlipped(false);
                setCurrentStep(prev => Math.max(0, prev - 1));
            };

            useEffect(() => {
                const onKeyDown = (e) => {
                    if (e.key === 'ArrowRight') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                    if (e.key === ' ') {
                        e.preventDefault();
                        if (currentStep >= 2 && currentStep - 2 < puzzles.length) {
                            setIsFlipped(prev => !prev);
                        }
                    }
                };
                window.addEventListener('keydown', onKeyDown);
                return () => window.removeEventListener('keydown', onKeyDown);
            }, [currentStep, puzzles]);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <div className="text-2xl animate-pulse font-light tracking-widest text-yellow-500 font-bold">教材載入中...</div>
                </div>
            );

            const puzzleIndex = currentStep - 2;
            const totalSlides = puzzles.length + 2;

            return (
                <div className="h-screen w-screen flex flex-col relative overflow-hidden">
                    
                    {/* Progress Bar */}
                    <div className="absolute top-0 left-0 w-full h-1 bg-slate-800 z-50">
                        <div 
                            className="h-full bg-yellow-500 transition-all duration-500 shadow-[0_0_10px_rgba(234,179,8,0.5)]" 
                            style={{ width: `${(currentStep / (totalSlides - 1)) * 100}%` }}
                        ></div>
                    </div>

                    <main className="flex-grow flex items-center justify-center p-4 md:p-8 lg:p-12 slide-enter overflow-hidden">
                        
                        {/* 0. Title Slide */}
                        {currentStep === 0 && (
                            <div className="text-center px-4">
                                <h1 className="text-5xl md:text-8xl font-bold mb-6 tracking-tighter text-white">水平思考謎題</h1>
                                <p className="text-xl md:text-3xl text-slate-400 font-light tracking-widest uppercase mb-16">Lateral Thinking Workshop</p>
                                <button 
                                    onClick={nextSlide}
                                    className="px-16 py-5 bg-yellow-500 text-slate-900 text-xl font-black rounded-full hover:bg-yellow-400 transition transform hover:scale-105 shadow-2xl active:scale-95"
                                >
                                    開始體驗挑戰 ➔
                                </button>
                            </div>
                        )}

                        {/* 1. Rules Slide */}
                        {currentStep === 1 && (
                            <div className="max-w-5xl w-full">
                                <h2 className="text-4xl md:text-5xl font-bold mb-12 border-l-8 border-yellow-500 pl-6 text-white">遊戲規則</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                                    <div className="bg-slate-800/60 p-10 lg:p-12 rounded-[2.5rem] border border-slate-700 shadow-xl">
                                        <h3 className="text-yellow-500 font-bold mb-6 text-2xl lg:text-3xl">提問限制</h3>
                                        <p className="text-slate-200 leading-relaxed text-xl lg:text-2xl">
                                            參與者只能詢問「是非題」，導師的答案僅會有：<br/>
                                            <span className="text-yellow-400 font-black mt-6 block text-3xl tracking-tight">「是」、「不是」、「無關」</span>
                                        </p>
                                    </div>
                                    <div className="bg-slate-800/60 p-10 lg:p-12 rounded-[2.5rem] border border-slate-700 shadow-xl">
                                        <h3 className="text-yellow-500 font-bold mb-6 text-2xl lg:text-3xl">核心目標</h3>
                                        <p className="text-slate-200 leading-relaxed text-xl lg:text-2xl">
                                            打破直覺陷阱，透過「水平思考」還原故事真相，找出那些隱藏在文字縫隙中的邏輯。
                                        </p>
                                    </div>
                                </div>
                                <div className="mt-16 text-center">
                                    <button onClick={nextSlide} className="text-yellow-500 hover:text-white transition font-bold text-2xl animate-bounce">進入第一個謎題 ➔</button>
                                </div>
                            </div>
                        )}

                        {/* 2. Puzzle Slide */}
                        {currentStep >= 2 && puzzleIndex < puzzles.length && (
                            <div className="w-full max-w-5xl h-[75vh] min-h-[550px] perspective-container">
                                <div className={`flip-card-inner ${isFlipped ? 'is-flipped' : ''}`}>
                                    
                                    {/* 正面：問題 (Question) */}
                                    <div className="backface-hidden card-front bg-white text-slate-900 rounded-[3rem] p-8 md:p-12 lg:p-16 flex flex-col shadow-2xl border-b-[16px] border-blue-600">
                                        <div className="flex justify-between items-center mb-6 shrink-0">
                                            <div className="flex items-center gap-4">
                                                <span className="w-4 h-4 rounded-full bg-blue-600 animate-pulse"></span>
                                                <span className="text-blue-600 font-black tracking-[0.2em] uppercase text-xl">Question {puzzleIndex + 1}</span>
                                            </div>
                                            <button 
                                                onClick={() => speak(puzzles[puzzleIndex].q)}
                                                className={`p-4 rounded-full transition-all duration-300 ${isSpeaking ? 'bg-red-500 text-white shadow-lg' : 'bg-slate-100 text-slate-400 hover:bg-blue-600 hover:text-white shadow-md'}`}
                                            >
                                                <SpeakerIcon />
                                            </button>
                                        </div>
                                        <div className="content-scroll-area custom-scrollbar">
                                            <div className="text-wrapper">
                                                <p className="text-3xl md:text-4xl lg:text-5xl font-bold text-center leading-[1.3] text-slate-800">
                                                    {puzzles[puzzleIndex].q}
                                                </p>
                                            </div>
                                        </div>
                                        <div className="mt-8 text-center shrink-0">
                                            <button 
                                                onClick={() => setIsFlipped(true)}
                                                className="px-14 py-4 bg-slate-900 text-white text-xl font-black rounded-2xl hover:bg-blue-700 transition-all shadow-xl hover:-translate-y-2 active:translate-y-0"
                                            >
                                                揭曉真相
                                            </button>
                                        </div>
                                    </div>

                                    {/* 背面：答案 (Answer) */}
                                    <div className="backface-hidden card-back bg-yellow-400 text-slate-900 rounded-[3rem] p-8 md:p-12 lg:p-16 flex flex-col shadow-2xl border-b-[16px] border-yellow-700">
                                        <div className="flex justify-between items-center mb-6 shrink-0">
                                            <div className="flex items-center gap-4">
                                                <span className="w-4 h-4 rounded-full bg-slate-900"></span>
                                                <span className="text-slate-900 font-black tracking-[0.2em] uppercase text-xl">The Truth</span>
                                            </div>
                                            <button 
                                                onClick={() => speak(puzzles[puzzleIndex].a)}
                                                className={`p-4 rounded-full transition-all duration-300 ${isSpeaking ? 'bg-red-600 text-white' : 'bg-yellow-500 text-yellow-900 hover:bg-slate-900 hover:text-white shadow-md'}`}
                                            >
                                                <SpeakerIcon />
                                            </button>
                                        </div>
                                        <div className="content-scroll-area custom-scrollbar">
                                            <div className="text-wrapper">
                                                <p className="text-2xl md:text-3xl lg:text-4xl font-bold text-center leading-relaxed text-slate-900">
                                                    {puzzles[puzzleIndex].a}
                                                </p>
                                            </div>
                                        </div>
                                        <div className="mt-8 text-center shrink-0">
                                            <button 
                                                onClick={() => setIsFlipped(false)}
                                                className="text-slate-900 font-black text-xl border-b-4 border-slate-900 hover:text-slate-700 transition-all pb-1"
                                            >
                                                ← 返回題目
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}

                        {/* 3. Ending Slide */}
                        {currentStep >= 2 && puzzleIndex >= puzzles.length && (
                            <div className="text-center slide-enter">
                                <div className="text-9xl mb-12">🚀</div>
                                <h2 className="text-6xl md:text-8xl font-bold mb-8 text-white tracking-tighter">思維全面升級！</h2>
                                <p className="text-slate-400 text-2xl md:text-3xl mb-20 tracking-wide font-light">恭喜！你已經掌握了從不同角度看世界的鑰匙。</p>
                                <button 
                                    onClick={() => setCurrentStep(0)}
                                    className="px-16 py-5 bg-yellow-500 text-slate-900 text-2xl font-black rounded-full hover:bg-yellow-400 transition shadow-2xl"
                                >
                                    重新開始挑戰
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Footer Navigation */}
                    <footer className="p-6 md:p-10 bg-slate-950/90 backdrop-blur-xl flex justify-between items-center border-t border-slate-800 shrink-0">
                        <div className="flex items-center gap-10">
                            <div className="text-slate-500 text-2xl font-mono">
                                <span className="font-bold text-yellow-500">{currentStep + 1}</span> <span className="mx-2">/</span> {totalSlides}
                            </div>
                            <div className="hidden xl:flex gap-4">
                                <span className="px-4 py-1.5 bg-slate-900 border border-slate-800 rounded-lg text-sm text-slate-500 font-medium">方向鍵切換</span>
                                <span className="px-4 py-1.5 bg-slate-900 border border-slate-800 rounded-lg text-sm text-slate-500 font-medium">空白鍵翻牌</span>
                            </div>
                        </div>
                        <div className="flex gap-6">
                            <button 
                                onClick={prevSlide}
                                disabled={currentStep === 0}
                                className={`px-10 py-4 rounded-2xl transition-all font-black text-xl shadow-lg ${currentStep === 0 ? 'opacity-10 cursor-not-allowed grayscale' : 'bg-slate-800 hover:bg-slate-700 text-white active:scale-95'}`}
                            >
                                上一頁
                            </button>
                            <button 
                                onClick={nextSlide}
                                disabled={currentStep === totalSlides - 1}
                                className={`px-12 py-4 rounded-2xl transition-all font-black text-xl shadow-2xl ${currentStep === totalSlides - 1 ? 'opacity-10 cursor-not-allowed grayscale' : 'bg-yellow-500 text-slate-900 hover:bg-yellow-400 active:scale-95'}`}
                            >
                                {currentStep === 0 ? '開始課程' : '下一頁 ➔'}
                            </button>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
